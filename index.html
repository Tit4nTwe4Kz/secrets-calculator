<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secrets Facebook Hack™ Impact Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
--primary-blue:#01B7FF;
--accent-yellow:#FFC82D;
--dark-bg:#101421;
--white:#FFF;
--black:#000;
--success-green:#1BD760;
--danger-red:#FF4D4D;
--border:rgba(255,255,255,0.08);
}

*{box-sizing:border-box}
body{margin:0;font-family:'Montserrat',sans-serif;background:var(--dark-bg);color:#fff}

/* HERO */
.hero{
padding:70px 20px;
text-align:center;
background:linear-gradient(180deg,#000 0%,#101421 100%);
}
.hero h1{font-size:38px;font-weight:800;margin:0}
.hero span{color:var(--accent-yellow)}

/* LAYOUT */
.wrapper{max-width:1200px;margin:-40px auto 80px;padding:0 20px}
.calculator-container{display:grid;grid-template-columns:1fr 1fr;gap:30px}
.card{background:#000;padding:40px;border-radius:12px;border:1px solid var(--border)}

.card h2{color:var(--primary-blue);margin-top:0}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.field{display:grid;gap:8px}
.field.full{grid-column:1/-1}

input[type="text"]{
padding:14px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

/* SLIDERS */
.range-container input[type="range"]{
-webkit-appearance:none;
width:100%;
height:6px;
background:#2a2a2a;
border-radius:4px;
}
.range-container input[type="range"]::-webkit-slider-thumb{
-webkit-appearance:none;
width:18px;
height:18px;
border-radius:50%;
background:#fff;
border:3px solid var(--primary-blue);
cursor:pointer;
}

.range-dots{
display:flex;
justify-content:space-between;
font-size:11px;
margin-top:8px;
color:rgba(255,255,255,0.6);
}

.pill{
display:inline-block;
background:var(--primary-blue);
color:#000;
padding:6px 12px;
border-radius:20px;
font-weight:700;
font-size:12px;
margin-top:8px;
}

/* RESULTS */
.impact-line{
display:grid;
grid-template-columns:1fr auto;
margin-top:20px;
font-size:14px;
}

.annual-savings{
font-size:52px;
font-weight:800;
margin-top:10px;
}

.good{color:var(--success-green)}
.bad{color:var(--danger-red)}

button{
width:100%;
padding:16px;
background:var(--primary-blue);
border:none;
border-radius:8px;
font-weight:700;
cursor:pointer;
margin-top:20px;
}
button:hover{background:var(--accent-yellow)}

@media(max-width:900px){
.calculator-container{grid-template-columns:1fr}
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<section class="hero">
<h1>COMPARE YOUR CURRENT PROGRAM VS <span>SECRETS FACEBOOK HACK™</span></h1>
</section>

<div class="wrapper">
<div class="calculator-container">

<!-- INPUT SIDE -->
<div class="card">
<h2>Current Program</h2>

<div class="grid">
<div class="field">
<label>Fee Per Run ($)</label>
<input type="text" id="curSpend">
</div>

<div class="field">
<label>Runs Per Year</label>
<input type="text" id="curRuns" value="12">
</div>

<div class="field full">
<label>Ad Spend Per Run</label>
<div class="range-container">
<input id="curAdSlider" type="range" min="500" max="2500" step="500" value="2500">
<div class="range-dots">
<span>$500</span><span>$1500</span><span>$2500</span>
</div>
</div>
<div class="pill">Selected: <span id="curAdSelected">$2,500</span></div>
</div>
</div>

<h2 style="margin-top:40px">Secrets Program</h2>

<div class="field full">
<label>Dealer Ad Spend Per Run</label>
<div class="range-container">
<input id="jaAdSlider" type="range" min="500" max="5000" step="500" value="2500">
<div class="range-dots">
<span>$500</span><span>$1500</span><span>$2500</span><span>$3500</span><span>$5000</span>
</div>
</div>
<div class="pill">Selected: <span id="jaAdSelected">$2,500</span></div>
</div>

<button onclick="exportPDF()">Download Executive PDF</button>

</div>

<!-- RESULTS SIDE -->
<div class="card">
<h2>12-Month Financial Impact</h2>

<div class="impact-line">
<span>Annual Savings</span>
<span id="impactPct">—</span>
</div>

<div class="annual-savings" id="impactValue">—</div>

</div>

</div>
</div>

<script>
function money(n){
return n.toLocaleString(undefined,{style:'currency',currency:'USD'})
}

function animateMoney(el,value){
if(!Number.isFinite(value)){el.textContent='—';return;}
let start=0,end=value;
let range=end-start;
let increment=range/60;
let current=start;
let timer=setInterval(()=>{
current+=increment;
if((increment>0&&current>=end)||(increment<0&&current<=end)){
current=end;clearInterval(timer);
}
el.textContent=money(Math.abs(current));
},16);
}

function calculate(){
let curSpend=parseFloat(document.getElementById("curSpend").value)||0;
let curRuns=parseFloat(document.getElementById("curRuns").value)||1;
let curAd=parseFloat(document.getElementById("curAdSlider").value)||0;
let jaAd=parseFloat(document.getElementById("jaAdSlider").value)||0;

let fixed=9000+(1000*12)+(250*12);

let curAnnual=(curSpend+curAd)*curRuns;
let secretsAnnual=fixed+(jaAd*curRuns);

let savings=curAnnual-secretsAnnual;
let improvement=(savings/curAnnual)*100;

animateMoney(document.getElementById("impactValue"),Math.abs(savings));

document.getElementById("impactPct").textContent=
isFinite(improvement)?"Improvement: "+improvement.toFixed(1)+"%":"—";

let el=document.getElementById("impactValue");
el.classList.remove("good","bad");
el.classList.add(savings>=0?"good":"bad");
}

["curSpend","curRuns","curAdSlider","jaAdSlider"].forEach(id=>{
document.getElementById(id).addEventListener("input",calculate);
});

document.getElementById("curAdSlider").addEventListener("input",e=>{
document.getElementById("curAdSelected").textContent=money(e.target.value);
});
document.getElementById("jaAdSlider").addEventListener("input",e=>{
document.getElementById("jaAdSelected").textContent=money(e.target.value);
});

/* PDF WITH FAINT REPEATING WATERMARK */
function exportPDF(){

const watermark="./JAFavicon.png";
const secretsLogo="./SecretsFBHack.png";
const johnsonLogo="./JohnsonAds-LOGOFINAL.jpeg";

let watermarkLayer="";
for(let i=0;i<30;i++){
watermarkLayer+=`<img src="${watermark}" style="width:120px;opacity:0.05;transform:rotate(-30deg);margin:60px;">`;
}

const pdfHTML=`
<div style="position:relative;font-family:Montserrat;padding:60px;background:#fff;min-height:1000px;overflow:hidden;">

<div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;z-index:0;">
${watermarkLayer}
</div>

<div style="position:relative;z-index:2;color:#000;">

<div style="display:flex;justify-content:space-between;align-items:center;">
<img src="${secretsLogo}" style="height:60px;">
<img src="${johnsonLogo}" style="height:50px;">
</div>

<h1 style="margin-top:50px;font-size:28px;">12-Month Financial Impact Report</h1>

<hr style="margin:30px 0;">

<div style="font-size:42px;font-weight:800;color:${document.getElementById("impactValue").classList.contains("good")?"#1BD760":"#FF4D4D"};">
${document.getElementById("impactValue").textContent}
</div>

<p style="margin-top:10px;">
${document.getElementById("impactPct").textContent}
</p>

<hr style="margin:40px 0;">

<p style="font-size:12px;color:#666;">
Secrets Facebook Hack™ is owned and operated by Johnson Advertising.
All projections are estimates based on dealer inputs.
</p>

</div>
</div>
`;

html2pdf().set({
margin:0.5,
filename:"Secrets-Impact-Executive-Report.pdf",
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'letter',orientation:'portrait'}
}).from(pdfHTML).save();
}

calculate();
</script>

</body>
</html>
